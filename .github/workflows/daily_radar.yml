name: Daily AI Radar

on:
  # Cron disabled: analyze now requires a locally-running Ollama instance
  # (nomic-embed-text + llama3.1:8b) that ubuntu-latest runners can't reach.
  # The local server (main.py serve) already runs the same pipeline hourly
  # against the real data/radar.db. Kept for manual one-off runs.
  workflow_dispatch:

jobs:
  radar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Restore DB cache
        uses: actions/cache@v4
        with:
          path: data/radar.db
          key: radar-db-${{ runner.os }}
          restore-keys: radar-db-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download NLTK data
        run: python -c "import nltk; nltk.download('punkt'); nltk.download('punkt_tab'); nltk.download('stopwords')"

      - name: Run full pipeline
        run: python main.py run

      - name: Save DB
        uses: actions/cache/save@v4
        with:
          path: data/radar.db
          key: radar-db-${{ runner.os }}-${{ github.run_id }}
